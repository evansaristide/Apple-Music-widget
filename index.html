<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Widget Pro</title>
  <style>
    @font-face {
      font-family: 'RuneScape UF Regular';
      src: url('./runescape_uf.ttf') format('truetype');
    }

    :root {
      --font-family: 'RuneScape UF Regular', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      --text: rgba(255,255,255,0.98);
      --muted: rgba(255,255,255,0.68);
      --line: rgba(255,255,255,0.14);
      --glass: rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.17);
      --shadow: 0 22px 50px rgba(0,0,0,0.28);
      --accent-a: rgba(104, 181, 255, 0.16);
      --accent-b: rgba(185, 120, 255, 0.14);
      --accent-c: rgba(255, 120, 146, 0.12);
      --card-width: 360px;
      --card-height: auto;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: var(--font-family);
      color: var(--text);
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 12px;
      background: transparent;
    }

    body.mode-overlay .stage {
      place-items: end end;
      padding: 24px;
    }

    .card {
      position: relative;
      width: min(var(--card-width), calc(100vw - 24px));
      min-height: 104px;
      padding: 14px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.07));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(26px) saturate(155%);
      -webkit-backdrop-filter: blur(26px) saturate(155%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.14);
      overflow: hidden;
      transform-origin: center;
      animation: floaty 7s ease-in-out infinite;
    }

    body.mode-overlay .card {
      width: 330px;
      opacity: 0.78;
      animation: overlayIdle 6s ease-in-out infinite;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 85% 20%, var(--accent-b), transparent 28%),
        radial-gradient(circle at 10% 85%, var(--accent-a), transparent 30%),
        radial-gradient(circle at 80% 80%, var(--accent-c), transparent 26%);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -60%;
      background: linear-gradient(115deg, transparent 42%, rgba(255,255,255,0.18) 50%, transparent 58%);
      transform: rotate(10deg);
      animation: shine 10s linear infinite;
      opacity: 0.65;
      pointer-events: none;
    }

    .card.pulse {
      animation:
        cardPulse 1s ease-out 1,
        floaty 7s ease-in-out infinite;
    }

    body.mode-overlay .card.pulse {
      animation:
        cardPulseOverlay 1s ease-out 1,
        overlayIdle 6s ease-in-out infinite;
    }

    .inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 14px;
      align-items: center;
    }

    .art {
      width: 74px;
      height: 74px;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.10);
      box-shadow: 0 10px 20px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta {
      min-width: 0;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .service {
      font-size: 10px;
      color: rgba(255,255,255,0.54);
      white-space: nowrap;
    }

    .title {
      margin: 0;
      font-size: 21px;
      line-height: 1.04;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 10px rgba(0,0,0,0.15);
    }

    .artist {
      margin-top: 5px;
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album {
      margin-top: 2px;
      font-size: 12px;
      color: rgba(255,255,255,0.56);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom {
      position: relative;
      z-index: 1;
      margin-top: 12px;
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      background: var(--line);
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .progress > span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255,255,255,0.95), rgba(255,255,255,0.72));
      box-shadow: 0 0 16px rgba(255,255,255,0.18);
      transition: width 0.35s ease;
    }

    .times {
      margin-top: 7px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(255,255,255,0.52);
    }

    .debug {
      position: fixed;
      left: 10px;
      bottom: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.72);
      font: 12px/1.2 Arial, sans-serif;
      display: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    body.debug .debug { display: inline-block; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-4px) scale(1.008); }
    }

    @keyframes overlayIdle {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.76; }
      50% { transform: translateY(-3px) scale(1.01); opacity: 0.84; }
    }

    @keyframes shine {
      0% { transform: translateX(-35%) rotate(10deg); }
      100% { transform: translateX(35%) rotate(10deg); }
    }

    @keyframes cardPulse {
      0%   { transform: scale(1); box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.14); }
      30%  { transform: scale(1.025); box-shadow: 0 26px 60px rgba(0,0,0,0.33), 0 0 28px rgba(186,120,255,0.18), inset 0 1px 0 rgba(255,255,255,0.18); }
      100% { transform: scale(1); box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.14); }
    }

    @keyframes cardPulseOverlay {
      0%   { transform: scale(1); opacity: 0.78; }
      30%  { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); opacity: 0.78; }
    }

    @media (max-width: 420px) {
      .card { width: min(100vw - 18px, 340px); padding: 12px; border-radius: 24px; }
      .inner { grid-template-columns: 66px 1fr; gap: 12px; }
      .art { width: 66px; height: 66px; border-radius: 18px; }
      .title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">
      <div class="inner">
        <div class="art">
          <img id="coverArt" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=600&q=80" alt="Album cover" />
        </div>

        <div class="meta">
          <div class="topline">
            <div class="label" id="label">Now playing</div>
            <div class="service" id="service">Spotify-ready</div>
          </div>
          <h1 class="title" id="songTitle">Your Song</h1>
          <div class="artist" id="artistName">Artist Name</div>
          <div class="album" id="albumName">Album Name</div>
        </div>
      </div>

      <div class="bottom">
        <div class="progress"><span id="progressFill"></span></div>
        <div class="times">
          <span id="currentTime">1:24</span>
          <span id="duration">3:42</span>
        </div>
      </div>
    </div>
  </div>

  <div class="debug">Space = pulse | ?mode=overlay for OBS</div>

  <script>
    const defaultConfig = {
      service: 'Spotify-ready',
      label: 'Now playing',
      songTitle: 'Your Song',
      artistName: 'Artist Name',
      albumName: 'Album Name',
      coverArt: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=600&q=80',
      progressPercent: 42,
      currentTime: '1:24',
      duration: '3:42',
      spotifyAccessToken: '' // paste a temporary Spotify access token here if you want live data
    };

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'notion';
    const debug = params.get('debug') === '1';

    if (mode === 'overlay') document.body.classList.add('mode-overlay');
    if (debug) document.body.classList.add('debug');

    const els = {
      card: document.getElementById('card'),
      label: document.getElementById('label'),
      service: document.getElementById('service'),
      songTitle: document.getElementById('songTitle'),
      artistName: document.getElementById('artistName'),
      albumName: document.getElementById('albumName'),
      coverArt: document.getElementById('coverArt'),
      progressFill: document.getElementById('progressFill'),
      currentTime: document.getElementById('currentTime'),
      duration: document.getElementById('duration')
    };

    function msToClock(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const min = Math.floor(totalSeconds / 60);
      const sec = totalSeconds % 60;
      return `${min}:${String(sec).padStart(2, '0')}`;
    }

    function pulseCard() {
      els.card.classList.remove('pulse');
      void els.card.offsetWidth;
      els.card.classList.add('pulse');
      clearTimeout(window.__pulseReset);
      window.__pulseReset = setTimeout(() => els.card.classList.remove('pulse'), 1000);
    }

    function applyTrack(data) {
      els.label.textContent = data.label || defaultConfig.label;
      els.service.textContent = data.service || defaultConfig.service;
      els.songTitle.textContent = data.songTitle || defaultConfig.songTitle;
      els.artistName.textContent = data.artistName || defaultConfig.artistName;
      els.albumName.textContent = data.albumName || defaultConfig.albumName;
      els.coverArt.src = data.coverArt || defaultConfig.coverArt;
      els.progressFill.style.width = `${Math.max(0, Math.min(100, data.progressPercent ?? defaultConfig.progressPercent))}%`;
      els.currentTime.textContent = data.currentTime || defaultConfig.currentTime;
      els.duration.textContent = data.duration || defaultConfig.duration;
    }

    applyTrack(defaultConfig);

    // Manual hooks for OBS/browser source/chat tools
    window.triggerWidgetPulse = pulseCard;
    window.setWidgetTrack = function(track) {
      applyTrack(track || {});
      pulseCard();
    };

    window.addEventListener('message', (event) => {
      if (!event || !event.data) return;
      if (event.data === 'triggerWidgetPulse' || event.data?.type === 'triggerWidgetPulse') {
        pulseCard();
      }
      if (event.data?.type === 'setWidgetTrack') {
        applyTrack(event.data.payload || {});
        pulseCard();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        pulseCard();
      }
    });

    async function fetchSpotifyCurrentlyPlaying(token) {
      const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (res.status === 204) return null;
      if (!res.ok) throw new Error(`Spotify error ${res.status}`);

      const json = await res.json();
      if (!json || !json.item) return null;

      const durationMs = json.item.duration_ms || 0;
      const progressMs = json.progress_ms || 0;
      const artists = Array.isArray(json.item.artists) ? json.item.artists.map(a => a.name).join(', ') : 'Unknown Artist';
      const image = json.item.album?.images?.[0]?.url || defaultConfig.coverArt;

      return {
        label: json.is_playing ? 'Now playing' : 'Paused',
        service: 'Spotify',
        songTitle: json.item.name || defaultConfig.songTitle,
        artistName: artists,
        albumName: json.item.album?.name || defaultConfig.albumName,
        coverArt: image,
        progressPercent: durationMs ? (progressMs / durationMs) * 100 : 0,
        currentTime: msToClock(progressMs),
        duration: msToClock(durationMs)
      };
    }

    async function startSpotifyPolling() {
      const token = params.get('spotify_token') || defaultConfig.spotifyAccessToken || localStorage.getItem('spotify_token') || '';
      if (!token) return;

      localStorage.setItem('spotify_token', token);

      let lastTrackKey = '';
      async function tick() {
        try {
          const track = await fetchSpotifyCurrentlyPlaying(token);
          if (track) {
            const key = `${track.songTitle}__${track.artistName}`;
            applyTrack(track);
            if (key !== lastTrackKey) {
              pulseCard();
              lastTrackKey = key;
            }
          }
        } catch (err) {
          console.error(err);
        }
      }

      await tick();
      setInterval(tick, 15000);
    }

    startSpotifyPolling();
  </script>
</body>
</html>
