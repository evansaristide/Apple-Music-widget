<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minimal Glass Music Card</title>
  <style>
    @font-face {
      font-family: 'RuneScape UF Regular';
      src: url('./runescape_uf.ttf') format('truetype');
    }

    :root {
      --font-family: 'RuneScape UF Regular', -apple-system, sans-serif;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.65);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: var(--font-family);
      color: var(--text);

      /* STRONG liquid glass background */
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255,0,100,0.25), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(0,150,255,0.2), transparent 50%),
        linear-gradient(180deg, #0b0c0f 0%, #14161b 100%);

      backdrop-filter: blur(60px);
      -webkit-backdrop-filter: blur(60px);
    }

    .card {
      width: 320px;
      padding: 16px;
      border-radius: 28px;

      /* glass effect */
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);

      backdrop-filter: blur(35px) saturate(180%);
      -webkit-backdrop-filter: blur(35px) saturate(180%);

      box-shadow:
        0 25px 70px rgba(0,0,0,0.5),
        inset 0 1px 2px rgba(255,255,255,0.25);

      position: relative;
      overflow: hidden;
    }

    /* shine effect */
    .card::before {
      content: "";
      position: absolute;
      inset: -50%;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25), transparent 70%);
      animation: shine 8s linear infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(100%) rotate(25deg); }
    }

    .row {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 12px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .cover {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      overflow: hidden;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      font-size: 18px;
      margin: 0;
    }

    .artist {
      font-size: 13px;
      color: var(--muted);
    }

    .progress {
      margin-top: 12px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 40%;
      height: 100%;
      background: white;
    }

  </style>
</head>
<body>

<div class="card">
  <div class="row">
    <div class="cover">
      <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4" />
    </div>

    <div>
      <h1 class="title">Your Song</h1>
      <div class="artist">Artist Name</div>
    </div>
  </div>

  <div class="progress"><span></span></div>
</div>

</body>
</html>
